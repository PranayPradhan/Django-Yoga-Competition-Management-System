{% extends "report/base.html" %}

{% block content %}

<div class="card shadow">

<div class="card-header bg-info text-white">
Gender List
</div>

<div class="card-body">

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>
<th>#</th>
<th>Gender</th>
</tr>
</thead>

<tbody>

{% for g in genders %}
<tr>
<td>{{ forloop.counter }}</td>
<td>{{ g.name }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>
</div>

{% endblock %}
